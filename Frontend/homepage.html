<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Homepage</title>
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/f90b4ddd1d.js" crossorigin="anonymous"></script>

    <style>        .navbar{
                    margin: 0;
                    }
               .fornavbar{
                background-color: #e6b378;
                background-image: linear-gradient(224deg,#9d8c6c7a,transparent);
               }

               .content{
                background-color: #2c261d;
                color: rgb(239, 236, 229);
               }

               .forh1{

                padding:5%;
                font-family: ui-sans-serif;
               }

               .card{

                    display: flex;
                    align-content: center;
                    flex-direction: column;
                    justify-items: center;
                    border-radius: 10px;
               }
               .cardcontainer{
                display: flex;
                flex-direction: column;
                margin-left: 5%;
                margin-bottom: 6%;
               }

               .cardcontainer img{
                height:80px; 
                width:80px;
                margin: 40px;
               }

               .card p{
                font-size: 25px;
                color: black;
                margin-left: 9px;
               }

               .footer{
                background-color: #e6b378;
                background-image: linear-gradient(224deg,#8d877d7a,transparent);
                padding-left: 40%;
               }
               li{
                list-style:none;
               }
              
    </style>
</head>

                              <div class=" col-sm-2 card">
